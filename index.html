<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalah &#25773;&#26827;</title>
    <link rel="preload" as="image" href="assets/ruby-gem.png?v=20260616d" />
    <link rel="preload" as="image" href="assets/amethyst-gem.png?v=20260616d" />
    <link rel="preload" as="image" href="assets/Coin.png?v=20260616d" />
    <link rel="preload" as="image" href="assets/Dragon.png?v=20260616d" />
    <link rel="preload" as="image" href="assets/Shield.png?v=20260616d" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=20260616d" />
  </head>
  <body>
    <main class="game-app">
      <section class="main-menu" id="mainMenu" aria-label="&#20027;&#33756;&#21934;">
        <div class="menu-title">
          <p class="eyebrow">Kalah</p>
          <h1>&#25773;&#26827;</h1>
        </div>
        <div class="menu-options" role="group" aria-label="&#27169;&#24335;">
          <button class="menu-option is-active" id="modePveButton" type="button" data-mode="pve">
            <span>&#21934;&#20154;&#27169;&#24335;</span>
            <small>vs AI</small>
          </button>
          <button class="menu-option" id="modePvpButton" type="button" data-mode="pvp">
            <span>&#38617;&#20154;&#27169;&#24335;</span>
            <small>Local</small>
          </button>
        </div>
        <div class="menu-difficulty" id="difficultyField">
          <span>AI &#38627;&#24230;</span>
          <div class="difficulty-options" role="group" aria-label="AI &#38627;&#24230;">
            <button class="difficulty-button" id="difficultyEasyButton" type="button" data-difficulty="easy">Easy</button>
            <button class="difficulty-button is-active" id="difficultyMediumButton" type="button" data-difficulty="medium">Medium</button>
            <button class="difficulty-button" id="difficultyHardButton" type="button" data-difficulty="hard">Hard</button>
          </div>
        </div>
        <p class="control-hint" id="controlHint"></p>
        <button class="start-button" id="startButton" type="button">&#38283;&#22987;</button>
      </section>

      <section class="game-screen" id="gameScreen" hidden>
        <header class="game-header">
          <div>
            <p class="eyebrow">Kalah</p>
            <h1>&#25773;&#26827;</h1>
          </div>
          <div class="game-actions">
            <button class="icon-button utility-button" id="rulesButton" type="button" aria-label="遊戲規則" title="遊戲規則">
              ?
            </button>
            <button class="icon-button utility-button" id="settingsButton" type="button" aria-label="設定" title="設定">
              &#9881;
            </button>
            <button class="icon-button" id="resetButton" type="button" aria-label="&#37325;&#26032;&#19968;&#23616;" title="&#37325;&#26032;&#19968;&#23616;">
              &#8635;
            </button>
            <button class="menu-return-button" id="menuButton" type="button">&#22238;&#20027;&#33756;&#21934;</button>
          </div>
        </header>

        <section class="ai-dialogue" id="aiDialogue" aria-live="polite">
          <p class="ai-dialogue-speaker" id="aiDialogueSpeaker">AI</p>
          <p class="ai-dialogue-line" id="aiDialogueLine"></p>
        </section>

        <section class="score-strip" aria-label="&#20998;&#25976;">
          <div class="player-score player-two" id="playerTwoScore">
            <span>&#32043;&#26041;</span>
            <strong>0</strong>
          </div>
          <div class="turn-indicator" id="turnIndicator" aria-live="polite">
            <img id="turnEmblem" src="assets/Coin.png?v=20260616d" alt="" aria-hidden="true" />
          </div>
          <div class="player-score player-one active" id="playerOneScore">
            <span>&#32005;&#26041;</span>
            <strong>0</strong>
          </div>
        </section>

        <section class="board-wrap" aria-label="Kalah &#25773;&#26827;&#26827;&#30436;">
          <div class="board" id="board"></div>
        </section>

        <p class="status sr-only" id="status" aria-live="polite"></p>
      </section>
    </main>

    <div class="coin-toss-overlay" id="coinTossOverlay" aria-live="polite">
      <button class="coin-toss-button" id="coinTossButton" type="button" aria-label="&#25237;&#25842;&#37504;&#24163;&#27770;&#23450;&#20808;&#25163;">
        <canvas class="coin-canvas" id="coinCanvas" aria-hidden="true"></canvas>
      </button>
      <p class="coin-toss-status" id="coinTossStatus">&#40670;&#25802;&#37504;&#24163;&#27770;&#23450;&#20808;&#25163;</p>
    </div>

    <div class="result-overlay" id="resultOverlay" hidden aria-live="polite">
      <div class="result-panel" id="resultPanel" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <div class="particle-field" id="particleField" aria-hidden="true"></div>
        <p class="result-kicker" id="resultKicker"></p>
        <h2 id="resultTitle"></h2>
        <p class="result-score" id="resultScore"></p>
        <div class="result-actions">
          <button class="result-button" id="resultResetButton" type="button">&#20877;&#38283;&#19968;&#23616;</button>
          <button class="result-button secondary" id="resultMenuButton" type="button">&#22238;&#20027;&#33756;&#21934;</button>
        </div>
      </div>
    </div>

    <div class="floating-card-overlay" id="rulesOverlay" hidden aria-live="polite">
      <section class="floating-card rules-card" role="dialog" aria-modal="true" aria-labelledby="rulesTitle">
        <button class="floating-card-close" id="rulesCloseButton" type="button" aria-label="關閉規則">&times;</button>
        <p class="floating-card-kicker">遊戲規則</p>
        <h2 id="rulesTitle">Kalah 播棋</h2>
        <div class="rules-list">
          <p>每位玩家各有 6 個穴與 1 個金庫。</p>
          <p>輪到你時，選自己的穴，把棋子逆時針一顆顆播下。</p>
          <p>最後一顆落進自己的金庫，可以再走一手。</p>
          <p>最後一顆落在自己的空穴，會吃掉對面穴位的棋子。</p>
          <p>一方穴位清空時結算，金庫棋子多者獲勝。</p>
        </div>
      </section>
    </div>

    <div class="floating-card-overlay" id="settingsOverlay" hidden aria-live="polite">
      <section class="floating-card settings-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <button class="floating-card-close" id="settingsCloseButton" type="button" aria-label="關閉設定">&times;</button>
        <p class="floating-card-kicker">設定</p>
        <h2 id="settingsTitle">顯示偏好</h2>
        <div class="setting-row">
          <div>
            <strong>穴位數字</strong>
            <small>切換棋穴右下角的計數樣式。</small>
          </div>
          <div class="segmented-control" role="group" aria-label="穴位數字樣式">
            <button class="setting-option is-active" id="pitRomanButton" type="button" data-pit-number-style="roman">羅馬</button>
            <button class="setting-option" id="pitArabicButton" type="button" data-pit-number-style="arabic">一般數字</button>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="script.js?v=20260616d"></script>
  </body>
</html>
